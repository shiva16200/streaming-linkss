name: Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - run: python3 generate_link.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "update"
          git push
